<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Arena — Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/signup.css">
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>
<div class="scanline"></div>

<div class="wrapper">
  <div class="corner-tag tl">// SYSTEM SIGNUP v2.4</div>

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div>
      <div class="logo">
        <div class="logo-icon">D</div>
        <div class="logo-text">DEBATE<br>ARENA</div>
      </div>
      <div class="side-title">JOIN<br>THE<br><span class="accent">ARENA.</span></div>
      <div class="side-desc">Create your account and step into the ultimate debate platform.</div>
    </div>
    <div>
      <div class="stat-bar">
        <div class="stat-header"><span>COMMUNITY SIZE</span><span>10K+</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:90%;"></div></div>
      </div>
      <div class="stat-bar">
        <div class="stat-header"><span>DEBATES HOSTED</span><span>5K+</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:85%; animation-delay:0.3s;"></div></div>
      </div>
      <div class="stat-bar">
        <div class="stat-header"><span>ACTIVE USERS</span><span>2K+</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:80%; animation-delay:0.6s;"></div></div>
      </div>
      <div class="tagline">// CREATE YOUR PROFILE</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="form-header">REGISTER_</div>
    <div class="form-sub">Join the debate arena</div>

    <div class="field">
      <label class="field-label">Full Name</label>
      <input class="field-input" type="text" placeholder="John Doe">
    </div>
    <div class="field">
      <label class="field-label">User_ID // Email</label>
      <input class="field-input" type="email" placeholder="user@domain.com">
    </div>
    <div class="field">
      <label class="field-label">Passkey // Password</label>
      <input class="field-input" type="password" placeholder="••••••••••••">
    </div>
    <div class="field">
      <label class="field-label">Confirm Password</label>
      <input class="field-input" type="password" placeholder="••••••••••••">
    </div>

    <div class="checkbox-row">
      <label class="check-label">
        <span class="check-box" onclick="this.classList.toggle('active')"></span>
        I AGREE TO TERMS
      </label>
    </div>

    <button class="submit-btn">JOIN ARENA →</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR_CONTINUE_WITH</div>
      <div class="divider-line"></div>
    </div>

    <div class="socials">
      <button class="social-btn">GOOGLE</button>
      <button class="social-btn">LINKEDIN</button>
      <button class="social-btn">APPLE</button>
    </div>

    <div class="bottom-text">
      HAVE CREDENTIALS? <a href="login.html">LOGIN</a>
    </div>
  </div>

  <div class="corner-tag br">STATUS: ONLINE // SECURE</div>
</div>

<script src="JS/signup.js"></script>
</body>
</html>
