<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debate Arena — Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/forgot-password.css">
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>
<div class="scanline"></div>

<div class="wrapper">
  <div class="corner-tag tl">// PASSWORD RESET v2.4</div>

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div>
      <div class="logo">
        <div class="logo-icon">D</div>
        <div class="logo-text">DEBATE<br>ARENA</div>
      </div>
      <div class="side-title">RESET<br>YOUR<br><span class="accent">ACCESS.</span></div>
      <div class="side-desc">Enter your email to receive a password reset link.</div>
    </div>
    <div>
      <div class="stat-bar">
        <div class="stat-header"><span>SECURITY LEVEL</span><span>100%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:100%;"></div></div>
      </div>
      <div class="stat-bar">
        <div class="stat-header"><span>RESET TIME</span><span>5 MIN</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:95%; animation-delay:0.3s;"></div></div>
      </div>
      <div class="stat-bar">
        <div class="stat-header"><span>SUPPORT AVAIL</span><span>24/7</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:90%; animation-delay:0.6s;"></div></div>
      </div>
      <div class="tagline">// SECURE RECOVERY</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="form-header">RESET_</div>
    <div class="form-sub">Recover your access</div>

    <div class="field">
      <label class="field-label">User_ID // Email</label>
      <input class="field-input" type="email" placeholder="user@domain.com">
    </div>

    <button class="submit-btn">SEND REQUEST →</button>

    <div class="bottom-text">
      REMEMBER PASSWORD? <a href="login.html">LOGIN</a>
    </div>
  </div>

  <div class="corner-tag br">STATUS: ONLINE // SECURE</div>
</div>

<script src="JS/forgot-password.js"></script>
</body>
</html>
